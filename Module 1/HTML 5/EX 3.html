<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Welcome Banner</title>

    <style>
        #welcomeBanner {
            background-color: lightblue;
            padding: 20px;
        }

        .highlight {
            background-color: yellow;
        }
    </style>
</head>
<h1>Community Portal</h1>

<body>

    <div id="welcomeBanner">
        <h2 class="highlight">Welcome User</h2>

        <p>
            Register for community events today!
        </p>

        <p>
            <span style="color:red; font-weight:bold;">
                Special Offer: Free entry for first 50 users!
            </span>
        </p>
    </div>

</body>

</html>
