<!DOCTYPE html>
<html>
<head>
    <title>Typography Example</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }

        h1 {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
        }

        h2 {
            font-size: 22px;
            font-style: italic;
        }

        p {
            font-size: 16px;
            letter-spacing: 1px;
            line-height: 1.6;
            text-align: justify;
        }
    </style>

</head>
<body>

    <h1>Community Events</h1>

    <h2>Upcoming Programs</h2>

    <p>
        Join our local events and enjoy various activities organized by the city council.
    </p>

</body>
</html>
