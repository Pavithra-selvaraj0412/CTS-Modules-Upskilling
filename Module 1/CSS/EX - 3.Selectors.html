<!DOCTYPE html>
<html>
<head>
    <title>Selectors Playground</title>

    <style>
        /* Universal selector */
        * {
            margin: 0;
            padding: 0;
        }

        /* Element selector */
        h2 {
            color: blue;
        }

        /* ID selector */
        #mainHeader {
            background-color: lightgray;
            text-align: center;
            padding: 10px;
        }

        /* Class selector */
        .eventCard {
            border: 1px solid black;
            margin: 10px;
            padding: 10px;
        }

        /* Grouping selector */
        h3, p {
            color: green;
        }
    </style>

</head>
<body>

    <h1 id="mainHeader">Community Events</h1>

    <h2>Upcoming Events</h2>

    <div class="eventCard">
        <h3>Music Fest</h3>
        <p>Enjoy live music this weekend.</p>
    </div>

    <div class="eventCard">
        <h3>Food Fair</h3>
        <p>Taste delicious local food.</p>
    </div>

</body>
</html>
